    ip: "10.11.1.181"
    ssh_auth: ad
    team: P680

  harbor:
    label: harbor
    role: registry
    ip: "10.11.1.196"
    ssh_auth: ad
    team: P660

  # ── SMTP ──────────────────────────────────────────────
  smtp-server:
    label: smtp-server
    role: mail_relay
    ip: "10.11.1.125"
    ssh_auth: env
    ssh_user_env: SMTP_USER
    ssh_pass_env: SMTP_PASS
    key_paths:
      mail_log: /var/log/mail.log
      mail_log_alt: /var/log/maillog

  ubiq-srm:
    label: ubiq-srm
    role: application
    ip: "10.11.1.114"
    ssh_auth: ad
    team: P670

  # ── P680 DB ───────────────────────────────────────────
  cloud-db:
    label: cloud-db
    role: database
    ip: "10.11.1.238"
