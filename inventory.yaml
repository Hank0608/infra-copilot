# Infrastructure CMDB
# ssh_auth: "env"  → 用 .env service account（rp-main 等系統帳號）
# ssh_auth: "ad"   → 用 AD Session（tools/auth.py login()）

data_flow:
  - external_client
  - rp-main
  - k8s-ingress
  - k8s-pod

nodes:
  # ── P660 MIS/Infra ────────────────────────────────────
  rp-main:
    label: rp-main
    role: reverse_proxy
    ip: "10.11.9.2"
    ssh_auth: env
    ssh_user_env: RP_USER
    ssh_pass_env: RP_PASS
    key_paths:
      nginx_config: /etc/nginx/nginx.conf
      nginx_sites: /etc/nginx/sites-available/
      nginx_access_log: /var/log/nginx/access.log
      nginx_error_log: /var/log/nginx/error.log

  mcp-vm:
    label: mcp-vm
    role: mcp_server
    ip: "10.11.1.247"
    ssh_auth: env
    ssh_user_env: MCP_VM_USER
    ssh_pass_env: MCP_VM_PASS

  # ── K8s ───────────────────────────────────────────────
  k8s-ingress:
    label: k8s-ingress
    role: ingress_controller
    ip: "10.11.1.236"
    ssh_auth: null
    kubeconfig: "~/.kube/prod-config"
    key_paths:
      ingress_namespace: ingress-nginx
      ingress_deploy: ingress-nginx-controller

  k8s-pod:
    label: k8s-pod
    role: application
    ip: null

  # ── AD 登入的服務主機 ─────────────────────────────────
  crm:
    label: crm
    role: application
    ip: "10.11.1.159"
    ssh_auth: ad
    team: P650

  okr:
    label: okr
    role: application
    ip: "10.11.1.163"
    ssh_auth: ad
    team: P680

  recruitment:
